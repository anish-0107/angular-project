<form [formGroup]="bookForm" (ngSubmit)="addBook()">
  <input type="text" placeholder="Title" formControlName="title">
  <input type="text" placeholder="Body" formControlName="body">
  <input type="text" placeholder="Category" formControlName="category">
  <input type="text" placeholder="ISBN" formControlName="isbn">
  <input type="number" placeholder="Total Copies" formControlName="totalCopies">
  <input type="date" placeholder="Publish Date" formControlName="publishedyear">
  
  <button type="submit" [disabled]="bookForm.invalid">Add Book</button>
</form>
