@if(currentrole === "librarian") {
<div class="book-card-wrapper" *appRoleDirective=" 'librarian' ">
    <div class="book-card admin-mode">
        <div class="card-header">
            <div class="header-main">
                <h3 class="book-title">{{Book.title}}</h3>
                <span class="book-id-badge">#{{Book.id}}</span>
            </div>
        </div>
        
        <div class="card-body">
            <p class="book-description">{{Book.body | truncate }}</p>
            
            <div class="inventory-status">
                <span class="status-label">Availability</span>
                <div class="status-bar-container">
                    <span class="status-text"><strong>{{Book.availableCopies}}</strong> / {{Book.totalCopies}} Copies</span>
                </div>
            </div>
        </div>

        <div class="card-footer admin-actions">
            <button class="btn btn-outline-danger" (click)="deleteme()">Delete</button>
            <button class="btn btn-admin-edit" (click)="onUpdateCliked()">Edit Book</button>
        </div>
    </div>
</div>
}

@else{
<div class="book-card-wrapper">
    <div class="book-card">
        <div class="card-header">
            <div class="header-main">
                <h3 class="book-title">{{Book.title}}</h3>
                <span class="book-id-badge">#{{Book.id}}</span>
            </div>
        </div>
        
        <div class="card-body">
            <p class="book-description">{{Book.body | truncate}}</p>
        </div>

        <div class="card-footer">
            <button class="btn btn-secondary" (click)="showdetails()">Details</button>
            <button class="btn btn-primary" (click)="borrowid()">Borrow Book</button>
        </div>
    </div>
</div>
}
